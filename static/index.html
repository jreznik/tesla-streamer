<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Streamer</title>
    <style>
        :root {
            --tesla-red: #E82127;
            --tesla-bg: #111111;
            --tesla-card: rgba(30, 30, 30, 0.9);
            --tesla-text: #F4F4F4;
            --tesla-gray: #8E8E93;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--tesla-bg);
            color: var(--tesla-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }

        video {
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
        }

        /* Tesla-Style Status Overlay */
        .status-overlay {
            position: absolute;
            z-index: 100;
            text-align: center;
            background: var(--tesla-card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            min-width: 300px;
            backdrop-filter: blur(10px);
            transition: opacity 0.5s ease-in-out;
        }

        /* Animated Spinner (Tesla Style) */
        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 25px;
            border: 3px solid rgba(232, 33, 39, 0.2);
            border-top: 3px solid var(--tesla-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .status-detail {
            font-size: 16px;
            color: var(--tesla-gray);
            font-weight: 300;
            line-height: 1.5;
        }

        /* Pulsing effect for text */
        .pulse {
            animation: pulse-text 2s infinite ease-in-out;
        }

        @keyframes pulse-text {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .stats-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 12px;
            font-family: 'SF Mono', monospace;
            font-size: 12px;
            color: #00FF00;
            pointer-events: none;
            display: none;
            border: 1px solid #444;
            z-index: 1000;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            opacity: 0;
            transition: opacity 0.5s;
            display: flex;
            gap: 15px;
            z-index: 200;
        }

        #video-container:hover .controls {
            opacity: 1;
        }

        button {
            background: var(--tesla-card);
            border: 1px solid #444;
            color: var(--tesla-text);
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        button:hover {
            background: #333;
            border-color: var(--tesla-red);
        }

        .error-icon {
            color: var(--tesla-red);
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div id="video-container">
        <!-- Dashboard Overlay -->
        <div id="status-overlay" class="status-overlay">
            <div id="status-visual">
                <div class="spinner"></div>
            </div>
            <div id="status-text" class="status-text pulse">Initializing</div>
            <div id="status-detail" class="status-detail">Preparing secure streaming link...</div>
        </div>

        <div id="stats" class="stats-overlay"></div>
        
        <video id="remoteVideo" autoplay playsinline muted></video>

        <!-- Hidden controls that appear on hover -->
        <div class="controls">
            <button onclick="requestKeyframe()">Refresh Link</button>
            <button id="stats-toggle" onclick="toggleStats()">Network Stats</button>
            <button onclick="toggleFullscreen()">Maximize</button>
        </div>
    </div>

    <script>
        const remoteVideo = document.getElementById('remoteVideo');
        const statusOverlay = document.getElementById('status-overlay');
        const statusVisual = document.getElementById('status-visual');
        const statusText = document.getElementById('status-text');
        const statusDetail = document.getElementById('status-detail');
        const statsOverlay = document.getElementById('stats');
        
        let pc = null;
        let ws = null;
        let statsInterval = null;

        /**
         * Tesla-Style Status Updater
         * @param {string} title - The main heading
         * @param {string} subtitle - Small gray detail text
         * @param {boolean} isError - Whether to show red error styling
         */
        function setTeslaStatus(title, subtitle = '', isError = false) {
            if (!title) {
                statusOverlay.classList.add('hidden');
                return;
            }

            statusOverlay.classList.remove('hidden');
            statusText.innerText = title;
            statusDetail.innerText = subtitle;

            if (isError) {
                statusVisual.innerHTML = '<div class="error-icon">⚠</div>';
                statusText.classList.remove('pulse');
                statusText.style.color = '#E82127';
            } else {
                statusVisual.innerHTML = '<div class="spinner"></div>';
                statusText.classList.add('pulse');
                statusText.style.color = '';
            }
        }

        async function initStream() {
            setTeslaStatus('Connecting', 'Connecting to Tesla Streamer cloud...');
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    setTeslaStatus('Negotiating', 'Handshaking with Steam Deck hardware...');
                    setupWebRTC();
                };

                ws.onmessage = async (event) => {
                    const msg = JSON.parse(event.data);
                    
                    if (msg.type === 'answer') {
                        setTeslaStatus('Streaming', 'Opening high-speed video pipeline...');
                        await pc.setRemoteDescription(new RTCSessionDescription({
                            type: 'answer',
                            sdp: msg.sdp
                        }));
                    } else if (msg.type === 'candidate') {
                        if (msg.candidate) {
                            await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
                        }
                    } else if (msg.type === 'display_config') {
                        setDisplayMode(msg.mode);
                    } else if (msg.type === 'stats_config') {
                        statsOverlay.style.display = msg.show ? 'block' : 'none';
                    }
                };

                ws.onclose = () => {
                    setTeslaStatus('Disconnected', 'Hotspot connection lost. Reconnecting...', true);
                    setTimeout(initStream, 3000);
                };

                ws.onerror = () => {
                    setTeslaStatus('Connection Error', 'Unable to reach the Steam Deck server.', true);
                };

            } catch (e) {
                setTeslaStatus('Startup Failed', e.message, true);
            }
        }

        async function setupWebRTC() {
            pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    ws.send(JSON.stringify({
                        type: 'candidate',
                        candidate: event.candidate
                    }));
                }
            };

            pc.ontrack = (event) => {
                console.log('Remote track received');
                remoteVideo.srcObject = event.streams[0];
                // Fade out overlay when video starts
                setTimeout(() => setTeslaStatus(''), 1000);
            };

            pc.onconnectionstatechange = () => {
                const state = pc.connectionState;
                console.log('WebRTC state:', state);
                if (state === 'connected') {
                    setTeslaStatus('');
                    startStats();
                } else if (state === 'failed' || state === 'disconnected') {
                    setTeslaStatus('Stream Interrupted', 'Re-establishing video link...', true);
                }
            };

            pc.addTransceiver('video', { direction: 'recvonly' });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            ws.send(JSON.stringify({
                type: 'offer',
                sdp: offer.sdp
            }));
        }

        function setDisplayMode(mode) {
            if (mode === 'stretch') {
                remoteVideo.style.objectFit = 'fill';
            } else if (mode === 'native') {
                remoteVideo.style.objectFit = 'none';
            } else {
                remoteVideo.style.objectFit = 'contain';
            }
        }

        function startStats() {
            if (statsInterval) clearInterval(statsInterval);
            statsInterval = setInterval(async () => {
                if (!pc) return;
                try {
                    const stats = await pc.getStats();
                    let statsText = '';
                    stats.forEach(report => {
                        if (report.type === 'inbound-rtp' && report.kind === 'video') {
                            const fps = report.framesPerSecond || 0;
                            const bitrate = Math.round(report.bytesReceived * 8 / (report.timestamp / 1000) / 1000);
                            statsText += `FPS: ${fps} | BITRATE: ${bitrate} KBPS | LOSS: ${report.packetsLost}`;
                        }
                    });
                    if (statsText) statsOverlay.innerText = statsText;
                } catch (e) {}
            }, 1000);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }

        function requestKeyframe() {
            if (ws) ws.send(JSON.stringify({ type: 'reselect' }));
        }

        function toggleStats() {
            const isVisible = statsOverlay.style.display === 'block';
            statsOverlay.style.display = isVisible ? 'none' : 'block';
            document.getElementById('stats-toggle').innerText = isVisible ? 'Show Stats' : 'Hide Stats';
        }

        // Auto-start on load
        window.addEventListener('load', initStream);
    </script>
</body>
</html>
