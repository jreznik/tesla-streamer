<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Streamer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            max-width: 100%;
            max-height: 100%;
            background-color: #000;
        }

        .status-overlay {
            position: absolute;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .status-text {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Pulsing animation for "Connecting" text */
        .connecting-pulse {
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Animated dots */
        .dots::after {
            content: '';
            animation: dots 1.5s infinite steps(4);
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .stats-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            pointer-events: none;
            display: none;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            gap: 10px;
        }

        #video-container:hover .controls {
            opacity: 1;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .error {
            color: #ff4444;
        }
    </style>
</head>
<body>
    <div id="video-container">
        <div id="status-overlay" class="status-overlay">
            <div id="status-text" class="status-text connecting-pulse">Connecting<span class="dots"></span></div>
            <div id="status-detail" style="font-size: 14px; color: #888;">Initializing WebRTC handshake</div>
        </div>

        <div id="stats" class="stats-overlay"></div>
        
        <video id="remoteVideo" autoplay playsinline muted></video>

        <div class="controls">
            <button onclick="toggleFullscreen()">Toggle Fullscreen</button>
            <button onclick="requestKeyframe()">Force Refresh</button>
            <button id="stats-toggle" onclick="toggleStats()">Show Stats</button>
        </div>
    </div>

    <script>
        const remoteVideo = document.getElementById('remoteVideo');
        const statusOverlay = document.getElementById('status-overlay');
        const statusText = document.getElementById('status-text');
        const statusDetail = document.getElementById('status-detail');
        const statsOverlay = document.getElementById('stats');
        
        let pc = null;
        let ws = null;
        let statsInterval = null;
        let displayMode = 'fit';

        function updateStatus(text, detail = '', isError = false) {
            statusText.innerText = text;
            statusDetail.innerText = detail;
            if (isError) {
                statusText.classList.add('error');
                statusText.classList.remove('connecting-pulse');
                // Remove dots span if it exists in error mode
                const dots = statusText.querySelector('.dots');
                if (dots) dots.remove();
            } else {
                statusText.classList.remove('error');
            }
            statusOverlay.style.display = (text === '') ? 'none' : 'block';
        }

        async function start() {
            updateStatus('Connecting', 'Connecting to signaling server...', false);
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                updateStatus('Connecting', 'Signaling server connected. Creating offer...', false);
                setupWebRTC();
            };

            ws.onmessage = async (event) => {
                const msg = JSON.parse(event.data);
                
                if (msg.type === 'answer') {
                    updateStatus('Connecting', 'Received answer. Establishing stream...', false);
                    await pc.setRemoteDescription(new RTCSessionDescription({
                        type: 'answer',
                        sdp: msg.sdp
                    }));
                } else if (msg.type === 'candidate') {
                    if (msg.candidate) {
                        await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
                    }
                } else if (msg.type === 'display_config') {
                    setDisplayMode(msg.mode);
                } else if (msg.type === 'stats_config') {
                    statsOverlay.style.display = msg.show ? 'block' : 'none';
                }
            };

            ws.onclose = () => {
                updateStatus('Disconnected', 'Connection to server lost. Retrying in 3s...', true);
                setTimeout(start, 3000);
            };

            ws.onerror = (e) => {
                updateStatus('Connection Error', 'Signaling failed. Check network.', true);
            };
        }

        async function setupWebRTC() {
            pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    ws.send(JSON.stringify({
                        type: 'candidate',
                        candidate: event.candidate
                    }));
                }
            };

            pc.ontrack = (event) => {
                console.log('Received remote track');
                updateStatus(''); // Clear status when video starts
                remoteVideo.srcObject = event.streams[0];
            };

            pc.onconnectionstatechange = () => {
                console.log('Connection state:', pc.connectionState);
                if (pc.connectionState === 'connected') {
                    updateStatus('');
                    startStats();
                } else if (pc.connectionState === 'failed') {
                    updateStatus('Stream Failed', 'WebRTC negotiation failed.', true);
                }
            };

            // Add transceiver for video
            pc.addTransceiver('video', { direction: 'recvonly' });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            ws.send(JSON.stringify({
                type: 'offer',
                sdp: offer.sdp
            }));
        }

        function setDisplayMode(mode) {
            displayMode = mode;
            if (mode === 'stretch') {
                remoteVideo.style.objectFit = 'fill';
                remoteVideo.style.width = '100%';
                remoteVideo.style.height = '100%';
            } else if (mode === 'native') {
                remoteVideo.style.objectFit = 'none';
                remoteVideo.style.width = 'auto';
                remoteVideo.style.height = 'auto';
            } else {
                // Default fit
                remoteVideo.style.objectFit = 'contain';
                remoteVideo.style.width = '100%';
                remoteVideo.style.height = '100%';
            }
        }

        function startStats() {
            if (statsInterval) clearInterval(statsInterval);
            statsInterval = setInterval(async () => {
                if (!pc) return;
                const stats = await pc.getStats();
                let statsText = '';
                stats.forEach(report => {
                    if (report.type === 'inbound-rtp' && report.kind === 'video') {
                        const fps = report.framesPerSecond || 0;
                        const bitrate = Math.round(report.bytesReceived * 8 / (report.timestamp / 1000) / 1000);
                        statsText += `FPS: ${fps} | Bitrate: ${bitrate} kbps | Loss: ${report.packetsLost}\n`;
                    }
                });
                statsOverlay.innerText = statsText;
            }, 1000);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function requestKeyframe() {
            if (ws) ws.send(JSON.stringify({ type: 'reselect' }));
        }

        function toggleStats() {
            const isVisible = statsOverlay.style.display === 'block';
            statsOverlay.style.display = isVisible ? 'none' : 'block';
            document.getElementById('stats-toggle').innerText = isVisible ? 'Show Stats' : 'Hide Stats';
        }

        // Start on load
        start();
    </script>
</body>
</html>
