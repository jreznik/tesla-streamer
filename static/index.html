<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Streamer</title>
    <style>
        :root {
            --tesla-red: #E82127;
            --tesla-bg: #111111;
            --tesla-card: rgba(30, 30, 30, 0.95);
            --tesla-text: #F4F4F4;
            --tesla-gray: #8E8E93;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: var(--tesla-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
            z-index: 1;
        }

        /* Fixed Centered Overlay */
        .status-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            text-align: center;
            background: var(--tesla-card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            min-width: 280px;
            /* Removed backdrop-filter for compatibility */
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 25px;
            border: 4px solid rgba(232, 33, 39, 0.1);
            border-top: 4px solid var(--tesla-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .status-detail {
            font-size: 14px;
            color: var(--tesla-gray);
            font-weight: 300;
        }

        .pulse {
            animation: pulse-text 2s infinite ease-in-out;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .stats-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            color: #00FF00;
            pointer-events: none;
            display: none;
            border: 1px solid #444;
            z-index: 200;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            gap: 12px;
            z-index: 150;
        }

        #video-container:hover .controls {
            opacity: 1;
        }

        button {
            background: rgba(40, 40, 40, 0.9);
            border: 1px solid #555;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }

        button:hover {
            border-color: var(--tesla-red);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="video-container">
        <!-- Video first in DOM -->
        <video id="remoteVideo" autoplay playsinline muted></video>

        <!-- Overlay second to ensure it is on top -->
        <div id="status-overlay" class="status-overlay">
            <div id="status-visual">
                <div class="spinner"></div>
            </div>
            <div id="status-text" class="status-text pulse">Connecting</div>
            <div id="status-detail" class="status-detail">Initialing handshake...</div>
        </div>

        <div id="stats" class="stats-overlay"></div>
        
        <div class="controls">
            <button onclick="requestKeyframe()">Refresh</button>
            <button id="stats-toggle" onclick="toggleStats()">Stats</button>
            <button onclick="toggleFullscreen()">Maximize</button>
        </div>
    </div>

    <script>
        const remoteVideo = document.getElementById('remoteVideo');
        const statusOverlay = document.getElementById('status-overlay');
        const statusVisual = document.getElementById('status-visual');
        const statusText = document.getElementById('status-text');
        const statusDetail = document.getElementById('status-detail');
        const statsOverlay = document.getElementById('stats');
        
        let pc = null;
        let ws = null;
        let statsInterval = null;

        function setStatus(title, subtitle = '', isError = false) {
            if (!title) {
                statusOverlay.classList.add('hidden');
                return;
            }

            statusOverlay.classList.remove('hidden');
            statusText.innerText = title;
            statusDetail.innerText = subtitle;

            if (isError) {
                statusVisual.innerHTML = '<div style="color:#E82127; font-size:40px; margin-bottom:20px">⚠</div>';
                statusText.classList.remove('pulse');
                statusText.style.color = '#E82127';
            } else {
                statusVisual.innerHTML = '<div class="spinner"></div>';
                statusText.classList.add('pulse');
                statusText.style.color = '';
            }
        }

        async function init() {
            setStatus('Connecting', 'Linking to signaling server...');
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    setStatus('Negotiating', 'Handshaking with hardware...');
                    setupWebRTC();
                };

                ws.onmessage = async (event) => {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'answer') {
                        setStatus('Streaming', 'Establishing data link...');
                        await pc.setRemoteDescription(new RTCSessionDescription({
                            type: 'answer',
                            sdp: msg.sdp
                        }));
                    } else if (msg.type === 'candidate') {
                        if (msg.candidate) {
                            await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
                        }
                    } else if (msg.type === 'display_config') {
                        setDisplayMode(msg.mode);
                    } else if (msg.type === 'stats_config') {
                        statsOverlay.style.display = msg.show ? 'block' : 'none';
                    }
                };

                ws.onclose = () => {
                    setStatus('Disconnected', 'Retrying in 3s...', true);
                    setTimeout(init, 3000);
                };

                ws.onerror = () => {
                    setStatus('Network Error', 'Check server status.', true);
                };

            } catch (e) {
                setStatus('Failed', e.message, true);
            }
        }

        async function setupWebRTC() {
            pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    ws.send(JSON.stringify({ type: 'candidate', candidate: event.candidate }));
                }
            };

            pc.ontrack = (event) => {
                console.log('Track received');
                remoteVideo.srcObject = event.streams[0];
                setTimeout(() => setStatus(''), 1000);
            };

            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'connected') {
                    setStatus('');
                    startStats();
                } else if (pc.connectionState === 'failed') {
                    setStatus('Stream Failed', 'Handshake error.', true);
                }
            };

            pc.addTransceiver('video', { direction: 'recvonly' });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify({ type: 'offer', sdp: offer.sdp }));
        }

        function setDisplayMode(mode) {
            if (mode === 'stretch') remoteVideo.style.objectFit = 'fill';
            else if (mode === 'native') remoteVideo.style.objectFit = 'none';
            else remoteVideo.style.objectFit = 'contain';
        }

        function startStats() {
            if (statsInterval) clearInterval(statsInterval);
            statsInterval = setInterval(async () => {
                if (!pc) return;
                try {
                    const stats = await pc.getStats();
                    stats.forEach(report => {
                        if (report.type === 'inbound-rtp' && report.kind === 'video') {
                            const fps = report.framesPerSecond || 0;
                            const bitrate = Math.round(report.bytesReceived * 8 / (report.timestamp / 1000) / 1000);
                            statsOverlay.innerText = `FPS: ${fps} | BITRATE: ${bitrate} KBPS | LOSS: ${report.packetsLost}`;
                        }
                    });
                } catch (e) {}
            }, 1000);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function requestKeyframe() {
            if (ws) ws.send(JSON.stringify({ type: 'reselect' }));
        }

        function toggleStats() {
            const isVisible = statsOverlay.style.display === 'block';
            statsOverlay.style.display = isVisible ? 'none' : 'block';
        }

        init();
    </script>
</body>
</html>
