<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Streamer</title>
    <style>
        :root {
            --tesla-red: #E82127;
            --tesla-bg: #000000;
            --tesla-card: rgba(25, 25, 25, 0.98);
            --tesla-text: #FFFFFF;
            --tesla-gray: #AAAAAA;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: var(--tesla-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #app-root {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
            z-index: 10;
        }

        /* Simplified, highly compatible overlay */
        #status-overlay {
            position: absolute;
            z-index: 100;
            text-align: center;
            background: var(--tesla-card);
            padding: 50px;
            border-radius: 24px;
            border: 1px solid #333;
            min-width: 300px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 30px;
            border: 4px solid rgba(232, 33, 39, 0.1);
            border-top: 4px solid var(--tesla-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .status-detail {
            font-size: 15px;
            color: var(--tesla-gray);
        }

        /* Animated dots */
        .dots::after {
            content: '';
            animation: dots-anim 1.5s infinite;
        }

        @keyframes dots-anim {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .stats-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            color: #00FF00;
            pointer-events: none;
            display: none;
            z-index: 200;
            border: 1px solid #444;
        }

        .controls {
            position: absolute;
            bottom: 40px;
            opacity: 0;
            transition: opacity 0.4s;
            display: flex;
            gap: 15px;
            z-index: 150;
        }

        #app-root:hover .controls {
            opacity: 1;
        }

        button {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            border-color: var(--tesla-red);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="app-root">
        <video id="remoteVideo" autoplay playsinline muted></video>

        <div id="status-overlay">
            <div id="status-visual">
                <div class="spinner"></div>
            </div>
            <div class="status-text">Connecting<span class="dots"></span></div>
            <div id="status-detail" class="status-detail">Starting Tesla Streamer...</div>
        </div>

        <div id="stats" class="stats-overlay"></div>
        
        <div class="controls">
            <button onclick="requestKeyframe()">Refresh</button>
            <button onclick="toggleStats()">Stats</button>
            <button onclick="toggleFullscreen()">Fullscreen</button>
        </div>
    </div>

    <script>
        const remoteVideo = document.getElementById('remoteVideo');
        const statusOverlay = document.getElementById('status-overlay');
        const statusVisual = document.getElementById('status-visual');
        const statusDetail = document.getElementById('status-detail');
        const statsOverlay = document.getElementById('stats');
        
        let pc = null;
        let ws = null;
        let statsInterval = null;

        function setStatus(detail, isError = false) {
            if (detail === null) {
                statusOverlay.classList.add('hidden');
                return;
            }

            statusOverlay.classList.remove('hidden');
            statusDetail.innerText = detail;

            if (isError) {
                statusVisual.innerHTML = '<div style="color:#E82127; font-size:48px; margin-bottom:20px">⚠</div>';
            } else {
                statusVisual.innerHTML = '<div class="spinner"></div>';
            }
        }

        async function connect() {
            setStatus('Connecting to signaling server...');
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    setStatus('Negotiating WebRTC handshake...');
                    startWebRTC();
                };

                ws.onmessage = async (event) => {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'answer') {
                        setStatus('Receiving video stream...');
                        await pc.setRemoteDescription(new RTCSessionDescription({
                            type: 'answer',
                            sdp: msg.sdp
                        }));
                    } else if (msg.type === 'candidate') {
                        if (msg.candidate) {
                            await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
                        }
                    } else if (msg.type === 'display_config') {
                        setDisplayMode(msg.mode);
                    } else if (msg.type === 'stats_config') {
                        statsOverlay.style.display = msg.show ? 'block' : 'none';
                    }
                };

                ws.onclose = () => {
                    setStatus('Disconnected. Reconnecting in 3s...', true);
                    setTimeout(connect, 3000);
                };

                ws.onerror = (e) => {
                    setStatus('Signaling error. Check network.', true);
                };

            } catch (e) {
                setStatus('Failed: ' + e.message, true);
            }
        }

        async function startWebRTC() {
            pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    ws.send(JSON.stringify({ type: 'candidate', candidate: event.candidate }));
                }
            };

            pc.ontrack = (event) => {
                console.log('Stream received');
                remoteVideo.srcObject = event.streams[0];
                // Wait slightly before hiding to ensure video is actually rendering
                setTimeout(() => setStatus(null), 1000);
            };

            pc.onconnectionstatechange = () => {
                console.log('Connection state:', pc.connectionState);
                if (pc.connectionState === 'connected') {
                    setStatus(null);
                    startStats();
                } else if (pc.connectionState === 'failed') {
                    setStatus('Streaming failed. Retrying...', true);
                    setTimeout(connect, 2000);
                }
            };

            pc.addTransceiver('video', { direction: 'recvonly' });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify({ type: 'offer', sdp: offer.sdp }));
        }

        function setDisplayMode(mode) {
            if (mode === 'stretch') remoteVideo.style.objectFit = 'fill';
            else if (mode === 'native') remoteVideo.style.objectFit = 'none';
            else remoteVideo.style.objectFit = 'contain';
        }

        function startStats() {
            if (statsInterval) clearInterval(statsInterval);
            statsInterval = setInterval(async () => {
                if (!pc) return;
                try {
                    const stats = await pc.getStats();
                    stats.forEach(report => {
                        if (report.type === 'inbound-rtp' && report.kind === 'video') {
                            const fps = report.framesPerSecond || 0;
                            const bitrate = Math.round(report.bytesReceived * 8 / (report.timestamp / 1000) / 1000);
                            statsOverlay.innerText = `FPS: ${fps} | BITRATE: ${bitrate} KBPS | LOSS: ${report.packetsLost}`;
                        }
                    });
                } catch (e) {}
            }, 1000);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function requestKeyframe() {
            if (ws) ws.send(JSON.stringify({ type: 'reselect' }));
        }

        function toggleStats() {
            const isVisible = statsOverlay.style.display === 'block';
            statsOverlay.style.display = isVisible ? 'none' : 'block';
        }

        // Start connection
        connect();
    </script>
</body>
</html>
